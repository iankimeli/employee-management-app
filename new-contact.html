<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Contact — EMS</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-icon"><i class="fa-solid fa-building-user"></i></span>
      <span class="brand-text">EMS</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
      <li><a href="new-contact.html" class="active"><i class="fa-solid fa-user-plus"></i> New Contact</a></li>
      <li><a href="view-contact.html"><i class="fa-solid fa-users"></i> View All Contacts</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-breadcrumb"><a href="index.html">Home</a> / New Contact</div>
      <h1 class="page-title"><i class="fa-solid fa-user-plus"></i> Add New Employee</h1>
      <p class="page-sub">Fill in the details below to register a new employee contact.</p>
    </div>
  </div>

  <!-- FORM SECTION -->
  <section class="form-section">
    <div class="form-wrapper">
      <div class="form-card">
        <div class="form-card-header">
          <span><i class="fa-solid fa-address-card"></i> Employee Details</span>
          <span class="form-step">Step 1 of 1</span>
        </div>

        <div class="form-body">
          <div class="form-row two-col">
            <div class="form-group">
              <label for="firstname"><i class="fa-solid fa-user"></i> First Name</label>
              <input type="text" id="firstname" placeholder="Enter first name" />
            </div>
            <div class="form-group">
              <label for="lastname"><i class="fa-solid fa-user"></i> Last Name</label>
              <input type="text" id="lastname" placeholder="Enter last name" />
            </div>
          </div>

          <div class="form-row two-col">
            <div class="form-group">
              <label for="email"><i class="fa-solid fa-envelope"></i> Email Address</label>
              <input type="email" id="email" placeholder="example@company.com" />
            </div>
            <div class="form-group">
              <label for="phone"><i class="fa-solid fa-phone"></i> Phone Number</label>
              <input type="tel" id="phone" placeholder="+2547-- -- ---" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label><i class="fa-solid fa-venus-mars"></i> Gender</label>
              <div class="radio-group">
                <label class="radio-label">
                  <input type="radio" name="gender" value="male" /> Male
                </label>
                <label class="radio-label">
                  <input type="radio" name="gender" value="female" /> Female
                </label>
              </div>
            </div>
          </div>

          <div class="form-row two-col">
            <div class="form-group">
              <label for="department"><i class="fa-solid fa-sitemap"></i> Department</label>
              <select id="department">
                <option value="">— Select Department —</option>
                <option>Information Technology</option>
                <option>Human Resources</option>
                <option>Finance</option>
                <option>Operations</option>
                <option>Marketing</option>
              </select>
            </div>
            <div class="form-group">
              <label for="position"><i class="fa-solid fa-id-badge"></i> Position</label>
              <select id="position">
                <option value="">— Select Position —</option>
                <option>Software Engineer</option>
                <option>HR Manager</option>
                <option>Accountant</option>
                <option>Operations Lead</option>
                <option>Marketing Analyst</option>
                <option>System Administrator</option>
              </select>
            </div>
          </div>

          <div class="form-row two-col">
            <div class="form-group">
              <label for="idnumber"><i class="fa-solid fa-fingerprint"></i> ID Number</label>
              <input type="text" id="idnumber" placeholder="National ID / Employee ID" />
            </div>
            <div class="form-group">
              <label for="dob"><i class="fa-solid fa-calendar"></i> Date of Birth</label>
              <input type="date" id="dob" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="address"><i class="fa-solid fa-location-dot"></i> Address</label>
              <input type="text" id="address" placeholder="Enter physical address" />
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-ghost" onclick="clearForm()"><i class="fa-solid fa-rotate-left"></i> Clear</button>
            <button type="button" class="btn btn-primary" onclick="submitForm()"><i class="fa-solid fa-floppy-disk"></i> Save Employee</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- SUCCESS TOAST -->
  <div class="toast" id="toast">
    <i class="fa-solid fa-circle-check"></i> Employee saved successfully!
  </div>

  <footer class="footer">
    <p>&copy; 2025 Employee Management System &mdash; Ian_Kimeli</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
